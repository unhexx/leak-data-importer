version: "3.8"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: leak
      POSTGRES_PASSWORD: leak
      POSTGRES_DB: leak_data
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U leak"]
      interval: 5s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5
    environment:
      NEO4J_AUTH: neo4j/please-change-me
      NEO4J_dbms_memory_pagecache_size: 512M
      NEO4J_dbms_memory_heap_max__size: 512M
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4jdata:/data
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "please-change-me", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Example one-shot import job (mount your reports into /data/input)
  importer:
    build: .
    depends_on:
      db:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    environment:
      # Example connection strings (override via .env or compose override)
      DATABASE_URL: postgresql://leak:leak@db:5432/leak_data
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: please-change-me
    volumes:
      - ./data:/data
    command: >
      import --source /data/input --format auto --stats
    profiles:
      - tools

  # Streamlit investigation UI
  streamlit:
    build: .
    depends_on:
      - db
      - neo4j
    ports:
      - "8501:8501"
    environment:
      DATABASE_URL: postgresql://leak:leak@db:5432/leak_data
      NEO4J_URI: bolt://neo4j:7687
    volumes:
      - ./data:/data
    command: >
      streamlit run app/streamlit_app.py --server.port 8501 --server.address 0.0.0.0
    profiles:
      - ui

volumes:
  pgdata:
  neo4jdata:
